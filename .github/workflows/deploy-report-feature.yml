name: Deploy Report Feature

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/20260406160000_add_monthly_expenses_report.sql'
      - 'supabase/functions/export-monthly-expenses/**'
      - 'public/index.html'
      - 'public/app-modular.js'
      - 'supabase/config.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Deploy migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ajbpzueanpeukozjhkiv
          supabase db push

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy export-monthly-expenses