<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JCC Saisie FFJDA</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>JCC Cattenom</h1>
    <p class="subtitle">Saisie licence FFJDA</p>
  </div>

  <div class="section">
    <label for="adherent-select">Adhérent à saisir</label>
    <select id="adherent-select">
      <option value="">-- Sélectionner un adhérent --</option>
    </select>
  </div>

  <div id="fiche" class="fiche hidden">
    <div class="field-row">
      <span class="label">Nom</span>
      <span id="f-nom" class="value"></span>
    </div>
    <div class="field-row">
      <span class="label">Prénom</span>
      <span id="f-prenom" class="value"></span>
    </div>
    <div class="field-row">
      <span class="label">Date de naissance</span>
      <span id="f-ddn" class="value"></span>
    </div>
    <div class="field-row">
      <span class="label">Email</span>
      <span id="f-email" class="value"></span>
    </div>
    <div class="field-row">
      <span class="label">Téléphone</span>
      <span id="f-tel" class="value"></span>
    </div>
    <div class="field-row">
      <span class="label">Adresse</span>
      <span id="f-adresse" class="value"></span>
    </div>
    <div class="field-row">
      <span class="label">Code postal</span>
      <span id="f-cp" class="value"></span>
    </div>
    <div class="field-row">
      <span class="label">Ville</span>
      <span id="f-ville" class="value"></span>
    </div>
    <div class="field-row">
      <span class="label">Sexe</span>
      <span id="f-sexe" class="value"></span>
    </div>
    <div class="field-row">
      <span class="label">Discipline</span>
      <span id="f-discipline" class="value"></span>
    </div>
  </div>

  <div id="status" class="status hidden"></div>

  <div class="actions">
    <button id="btn-fill" class="btn-primary" disabled>
      Préremplir le formulaire FFJDA
    </button>
    <button id="btn-load" class="btn-secondary">
      Charger les données
    </button>
  </div>

  <div class="footer">
    <span>Ouvrez d'abord <a href="https://moncompte.ffjudo.com/prise-licence" target="_blank">moncompte.ffjudo.com</a></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
