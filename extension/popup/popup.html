<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JCC Saisie FFJDA</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>JCC Cattenom</h1>
    <p class="subtitle">Saisie licence FFJDA</p>
  </div>

  <!-- Onglets mode -->
  <div class="tabs">
    <button class="tab active" data-tab="nouvelle">Nouvelle licence</button>
    <button class="tab" data-tab="renouvellement">Renouvellement</button>
  </div>

  <div class="section">
    <div class="select-header">
      <label>Adhérents à saisir</label>
      <div class="select-actions">
        <button id="btn-all" class="btn-link">Tout</button>
        <button id="btn-none" class="btn-link">Aucun</button>
        <span id="counter" class="counter">0 sélectionné(s)</span>
      </div>
    </div>
    <div id="adherent-list" class="adherent-list"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progression</span>
      <span class="progress-current">0/0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>

  <div id="status" class="status hidden"></div>

  <div class="actions">
    <button id="btn-fill" class="btn-primary" disabled>
      ▶ Lancer la saisie
    </button>
    <button id="btn-load" class="btn-secondary">
      Charger les données
    </button>
  </div>

  <div class="footer">
    <span>Ouvrez d'abord <a href="https://moncompte.ffjudo.com/espace-club/prise-licence" target="_blank">moncompte.ffjudo.com</a></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
