<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Judo Coach Tracker – Admin</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Admin – Coach hours</h1>

    <!-- Admin login (same as main app) -->
    <div id="adminAuth">
      <input id="adminEmail" type="email" placeholder="Admin email">
      <input id="adminPassword" type="password" placeholder="Password">
      <button id="adminLoginBtn">Login</button>
      <button id="adminLogoutBtn" style="display:none">Logout</button>
      <span id="adminStatus">Not logged in.</span>
    </div>

    <!-- Coach selector -->
    <div id="adminPanel" style="display:none">
      <h2>Load coach data</h2>
      <label>Coach user UID (from Firebase Auth):
        <input id="targetUid" type="text">
      </label>
      <label>
      <label>Coach :
        <select id="adminCoachSelect">
          <option value="">-- Sélectionner un coach --</option>
        </select>
      </label>
      <label>Month:
        <input id="adminMonth" type="month" value="2026-02">
      </label>
      <button id="loadCoachBtn">Load</button>

      <div id="adminCoachName"></div>

      <!-- Reuse same calendar + summary IDs as main app -->
      <div id="calendar" class="calendar"></div>

      <div class="summary">
        <div>Total hours: <span id="totalHours">0</span></div>
        <div>Hourly rate: <span id="hourlyRate">€0.00</span></div>
        <div>Training payment: <span id="trainingPayment">€0.00</span></div>
        <div>Competition days: <span id="compDays">0</span></div>
        <div>Competition payment: <span id="compPayment">€0.00</span></div>
        <div>Total km: <span id="totalKm">0</span></div>
        <div>Km payment: <span id="kmPayment">€0.00</span></div>
        <div>Total payment: <span id="totalPayment">€0.00</span></div>
      </div>

      <button id="exportBtn">Export month (CSV)</button>
      <button id="adminMileageBtn">Export mileage note (HTML + PDF)</button>

    </div>

    <script type="module" src="admin-app.js"></script>
  </body>
</html>
