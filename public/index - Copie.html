<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Judo Coach Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Judo Coach Tracker</h1>

  <!-- Auth section -->
  <section id="authSection">
    <h2>Authentication</h2>
    <label for="authEmail">Email:</label>
    <input type="email" id="authEmail" />

    <label for="authPassword">Password:</label>
    <input type="password" id="authPassword" />

    <button id="registerBtn">Register</button>
    <button id="loginBtn">Login</button>
    <button id="logoutBtn" style="display:none;">Logout</button>

    <span id="authStatus">Not logged in.</span>
  </section>

  <!-- Main app, hidden until logged in -->
  <div id="appContainer" style="display:none;">
    <!-- Coach and month selection -->
    <section>
      <label for="coachSelect">Coach:</label>
      <select id="coachSelect">
        <option value="">-- Select Coach --</option>
      </select>

      <label for="monthSelect">Month:</label>
      <input type="month" id="monthSelect" value="2026-02" />

      <button id="addCoachBtn">Add coach</button>
      <button id="editCoachBtn">Edit coach</button>
    </section>

    <!-- Calendar -->
    <section>
      <div id="calendar" class="calendar"></div>
    </section>

    <!-- Summary and exports -->
    <section id="summarySection">
      <h2>Summary</h2>
      <p>Total hours: <span id="totalHours">0</span></p>
      <p>Hourly rate: <span id="hourlyRate">€0.00</span></p>
      <p>Training payment: <span id="trainingPayment">€0.00</span></p>

      <p>Competition days: <span id="compDays">0</span></p>
      <p>Competition payment: <span id="compPayment">€0.00</span></p>

      <p>Total km: <span id="totalKm">0</span></p>
      <p>Km payment: <span id="kmPayment">€0.00</span></p>

      <p>Total payment: <span id="totalPayment">€0.00</span></p>

      <button id="exportBtn">Export salary (CSV)</button>
      <button id="mileageBtn">Export mileage note (CSV)</button>

      <div style="margin-top:1em;">
        <input type="file" id="importFile" accept=".json" />
        <button id="importBtn">Import JSON</button>
      </div>
    </section>
  </div>

  <!-- Coach modal -->
  <div id="coachModal" class="modal">
    <div class="modal-content">
      <h2>Coach</h2>

      <label for="coachName">Name</label>
      <input type="text" id="coachName" />

      <label for="coachAddress">Address</label>
      <input type="text" id="coachAddress" />

      <label for="coachVehicle">Vehicle (make &amp; model)</label>
      <input type="text" id="coachVehicle" />

      <label for="coachFiscalPower">Fiscal power (CV)</label>
      <input type="number" id="coachFiscalPower" />

      <label for="coachRate">Hourly rate (€)</label>
      <input type="number" id="coachRate" step="0.01" />

      <label for="dailyAllowance">Daily allowance (€)</label>
      <input type="number" id="dailyAllowance" step="0.01" />

      <label for="kmRate">Km rate (€ / km)</label>
      <input type="number" id="kmRate" step="0.01" value="0.35" />

      <div class="modal-actions">
        <button id="saveCoach">Save</button>
        <button id="cancelCoach">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Day modal -->
  <div id="dayModal" class="modal">
    <div class="modal-content">
      <h2 id="dayTitle">Edit day</h2>

      <label for="trainingHours">Training hours</label>
      <input type="number" id="trainingHours" step="0.5" min="0" />

      <label>
        <input type="checkbox" id="competitionDay" />
        Competition day
      </label>

      <div id="travelGroup" style="display:none;">
        <label for="kilometers">Kilometers</label>
        <input type="number" id="kilometers" step="1" min="0" />

        <label for="departurePlace">Lieu de départ</label>
        <input type="text" id="departurePlace" />

        <label for="arrivalPlace">Lieu d'arrivée</label>
        <input type="text" id="arrivalPlace" />

        <label for="competitionDescription">Competition / travel description</label>
        <textarea id="competitionDescription"></textarea>
      </div>

      <div class="modal-actions">
        <button id="saveDay">Save</button>
        <button id="deleteDay">Delete</button>
        <button id="cancelDay">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Firebase modular script -->
  <script type="module" src="app-modular.js"></script>
</body>
</html>
