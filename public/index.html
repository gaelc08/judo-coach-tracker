<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Judo Coach Tracker</title>
    <link rel="stylesheet" href="style.css">
  </head>
<body>
  
  <!-- Auth area -->
  <div id="authContainer" class="auth-container">
    <h1>Judo Coach Tracker</h1>

    <div id="authRow" class="auth-row">
      <input id="authEmail" type="email" placeholder="Email">
      <input id="authPassword" type="password" placeholder="Password">
    </div>

    <div id="authButtons" class="auth-buttons">
      <button id="registerBtn">Register</button>
      <button id="loginBtn">Login</button>
      <button id="resetPasswordBtn">Reset Password</button>
      <button id="logoutBtn" style="display:none">Logout</button>
    </div>

    <div id="authStatus">Not logged in.</div>
  </div>

  <!-- Main app (hidden until logged in) -->
  <div id="appContainer" style="display:none">
    <div class="toolbar">
      <label>
        Entraîneur:
        <select id="coachSelect">
          <option value="">-- Sélectionner Entraîneur --</option>
        </select>
      </label>

      <label>
        Mois:
        <input id="monthSelect" type="month" value="2026-02">
      </label>

      <button id="addCoachBtn" class="admin-only" style="display:none">Ajouter entraîneur</button>
      <button id="editCoachBtn" class="admin-only" style="display:none">Modifier entraîneur</button>
    </div>

    <!-- Calendar -->
    <div id="calendar" class="calendar"></div>

    <!-- Summary -->
    <div class="summary">
      <div>Total des heures: <span id="totalHours">0</span></div>
      <div>Taux horaire: <span id="hourlyRate">€0.00</span></div>
      <div>Paiement entraînement: <span id="trainingPayment">€0.00</span></div>
      <div>Jours de compétition: <span id="compDays">0</span></div>
      <div>Paiement compétition: <span id="compPayment">€0.00</span></div>
      <div>Total km: <span id="totalKm">0</span></div>
      <div>Paiement km: <span id="kmPayment">€0.00</span></div>
      <div>Paiement total: <span id="totalPayment">€0.00</span></div>
    </div>

    <div class="actions">
      <button id="exportBtn">Exporter salaire (CSV)</button>
      <button id="mileageBtn">Exporter note de frais km (HTML + PDF)</button>

      <input id="importFile" type="file" accept=".json">
      <button id="importBtn">Importer JSON</button>
    </div>
  </div>

  <!-- Coach modal -->
  <div id="coachModal" class="modal">
    <div class="modal-content">
      <h2>Entraîneur</h2>
      <label>Nom
        <input id="coachName" type="text">
      </label>
      <label>Prénom
        <input id="coachFirstName" type="text">
      </label>
      <label>Email
        <input id="coachEmail" type="email">
      </label>
      <label for="coachOwnerUid">Owner UID (id Supabase du coach)</label>
        <input type="text" id="coachOwnerUid" placeholder="UUID du coach">
      <label>Adresse
        <input id="coachAddress" type="text">
      </label>
      <label>Véhicule (marque & modèle)
        <input id="coachVehicle" type="text">
      </label>
      <label>Puissance fiscale (CV)
        <input id="coachFiscalPower" type="number">
      </label>
      <label>Taux horaire (€)
        <input id="coachRate" type="number" step="0.1">
      </label>
      <label>Indemnité journalière (€)
        <input id="dailyAllowance" type="number" step="0.1">
      </label>
      <label>Taux km (€ / km)
        <input id="kmRate" type="number" step="0.01" value="0.35">
      </label>

      <div class="modal-actions">
        <button id="saveCoach" onclick="saveCoach()">Sauvegarder</button>
        <button id="deleteCoach" style="display:none">Supprimer</button>
        <button id="cancelCoach">Annuler</button>
      </div>
    </div>
  </div>

  <!-- Day modal -->
  <div id="dayModal" class="modal">
    <div class="modal-content">
      <h2 id="dayTitle">Modifier jour</h2>

      <label>Heures d'entraînement
        <input id="trainingHours" type="number" step="0.5" min="0">
      </label>

      <label>
        <input id="competitionDay" type="checkbox">
        Jour de compétition
      </label>

      <div id="travelGroup" style="display:none">
        <label>Kilomètres
          <input id="kilometers" type="number" step="1" min="0">
        </label>
        <label>Lieu de départ
          <input id="departurePlace" type="text">
        </label>
        <label>Lieu d'arrivée
          <input id="arrivalPlace" type="text">
        </label>
        <label>Description de la compétition / trajet
          <input id="competitionDescription" type="text">
        </label>
        <label>Péage (€)
          <input id="peage" type="number" step="0.01" min="0">
        </label>
        <label>Justificatif de péage
          <input id="peageJustification" type="file" accept=".pdf,.jpg,.png">
        </label>
      </div>

      <div class="modal-actions">
        <button id="saveDay">Sauvegarder</button>
        <button id="deleteDay">Supprimer</button>
        <button id="cancelDay">Annuler</button>
      </div>
    </div>
  </div>

  <script type="module" src="app-modular.js"></script>
</body>
</html>
