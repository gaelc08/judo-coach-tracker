<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f3460">
    <title>Hors ligne – Judo Coach</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
        color: #fff;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        text-align: center;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      }
      img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        border-radius: 50%;
        background: white;
        padding: 8px;
        margin-bottom: 16px;
      }
      h1 { margin: 0 0 12px; font-size: 1.5rem; }
      p { margin: 0 0 10px; line-height: 1.5; color: rgba(255,255,255,0.88); }
      a {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 16px;
        border-radius: 10px;
        text-decoration: none;
        background: #c0392b;
        color: white;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="logo-jcc.png" alt="Judo Club de Cattenom-Rodemack">
      <h1>Mode hors ligne</h1>
      <p>L'application est installée, mais une connexion Internet est nécessaire pour l'authentification et la synchronisation des feuilles.</p>
      <p>Reconnectez-vous puis rechargez la page pour continuer.</p>
      <a href="/">Réessayer</a>
    </div>
  </body>
</html>
