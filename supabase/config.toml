project_id = "ajbpzueanpeukozjhkiv"

[auth]
# Site URL: the canonical URL of the deployed application.
# This is used by Supabase as the default redirect destination in auth emails
# (e.g. password-reset links).  Keep this in sync with the value set in the
# Supabase dashboard under Authentication → URL Configuration → Site URL.
site_url = "https://jccattenom.cantarero.fr/"

# Additional URLs that Supabase Auth is allowed to redirect to after an auth
# flow (e.g. after a user clicks the password-reset link in their email).
# Any origin from which users may trigger a password reset must be listed here
# so that the `redirectTo` parameter passed in resetPasswordForEmail() is
# honoured.  Without a matching entry Supabase falls back to `site_url`.
additional_redirect_urls = [
  "http://localhost:8000",
  "http://localhost:8000/",
  "http://127.0.0.1:8000",
  "http://127.0.0.1:8000/",
  "https://jccattenom-dev.cantarero.fr",
  "https://jccattenom-dev.cantarero.fr/",
  "https://gaelc08.github.io/judo-coach-tracker/?env=dev",
  "https://gaelc08.github.io/judo-coach-tracker/?env=prod",
  "https://jccattenom.cantarero.fr",
  "https://jccattenom.cantarero.fr/",
  "https://gaelc08.github.io/judo-coach-tracker",
  "https://gaelc08.github.io/judo-coach-tracker/"
]

[functions.app]
# verify_jwt = false is intentional: this function serves a public static SPA
# and does not require an authenticated Supabase session to access.
verify_jwt = false

[functions.invite-coach]
# verify_jwt = false: JWT verification is handled inside the function itself via
# supabaseAdmin.auth.getUser(token).  The gateway-level check (verify_jwt = true)
# was causing "Invalid JWT" errors when the client's autoRefreshToken is disabled
# and the token had expired before reaching the function.
verify_jwt = false
